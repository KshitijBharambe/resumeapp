name: Remote Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd "C:\Users\kshit\Downloads\resumeapp"
          git pull origin main
      - name: Deploy with PM2
        run: |
          pm2 delete resume-app || true
          pm2 start "uv run python app.py" --name "resume-app"
        working-directory: "C:/Users/kshit/Downloads/resumeapp"
